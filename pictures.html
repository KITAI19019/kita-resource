<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图像 — KITA resource</title>
    <meta name="description" content="KITA 使用模型制作的图像展示页，自动从公开图片仓库读取并按文件名排序。">
    <link rel="canonical" href="https://kitaresource.com/pictures.html">
    <link rel="stylesheet" href="blog.css">
    <link rel="icon" type="image/png" href="assets/kita-logo-64.png">
</head>

<body class="picture-page picture-locked">
    <header>
        <h1><a href="index.html"><img src="assets/kita-logo-64.png" alt="" class="site-logo">KITA resource</a></h1>
        <div class="search-box">
            <input type="search" id="searchInput" placeholder="搜索图像名称...">
            <div class="search-results" id="searchResults"></div>
        </div>
    </header>

    <nav>
        <input type="checkbox" id="menu-toggle" />
        <label for="menu-toggle" class="menu-icon">&#9776;</label>
        <div class="menu-links">
            <a href="index.html">首页</a>
            <a href="resource.html">资源站</a>
            <a href="pictures.html" class="active">图像</a>
            <a href="contact.html">反馈</a>
            <a href="about.html">关于</a>
        </div>
    </nav>

    <main class="picture-shell">
        <section class="picture-gate" id="pictureGate" aria-labelledby="pictureGateTitle">
            <div class="eyebrow">PRIVATE ENTRY</div>
            <h1 id="pictureGateTitle">图像单元</h1>
            <form class="picture-gate-form" id="pictureGateForm">
                <label for="picturePassword">访问密码</label>
                <div class="picture-password-row">
                    <input type="password" id="picturePassword" autocomplete="current-password" placeholder="请输入密码">
                    <button type="submit" class="btn">进入</button>
                </div>
                <p class="picture-gate-message" id="pictureGateMessage" aria-live="polite"></p>
            </form>
        </section>

        <div class="picture-content" id="pictureContent" hidden>
        <section class="picture-hero" aria-labelledby="pictureTitle">
            <div>
                <div class="eyebrow">MODEL IMAGE GALLERY</div>
                <h1 id="pictureTitle">图像</h1>
                <p>这里展示我使用模型制作的图片。页面会从公开图片仓库自动读取文件列表，并按文件名的字母顺序竖排展示。</p>
            </div>
            <div class="picture-hero-badge" aria-label="图像仓库">
                <span>Source</span>
                <strong>KITAI19019/pictures</strong>
            </div>
        </section>

        <div class="picture-layout">
            <aside class="picture-sidebar" aria-label="按首字母筛选">
                <div class="picture-sidebar-inner">
                    <h2>首字母</h2>
                    <div class="letter-list" id="letterList">
                        <button type="button" class="letter-chip active" data-letter="all">全部</button>
                    </div>
                </div>
            </aside>

            <section class="picture-gallery" aria-live="polite">
                <div class="picture-toolbar">
                    <div>
                        <span class="picture-count" id="pictureCount">读取中</span>
                        <p id="pictureStatus">正在整理图像列表...</p>
                    </div>
                    <a class="btn secondary" href="https://github.com/KITAI19019/pictures" target="_blank" rel="noopener">查看仓库</a>
                </div>
                <div class="picture-list" id="pictureList"></div>
            </section>
        </div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <nav class="footer-links">
                <a href="https://github.com/kitai19019/" target="_blank">GitHub主页</a>
                <a href="contact.html">提交反馈</a>
            </nav>
            <p class="copyright">Copyright &copy; 2026 KITA</p>
        </div>
    </footer>

    <script src="scripts.js"></script>
    <script src="pictures.js"></script>
</body>

</html>
